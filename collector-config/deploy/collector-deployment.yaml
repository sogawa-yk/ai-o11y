apiVersion: v1
kind: ConfigMap
metadata:
  name: ch15-collector-config
  namespace: aio11y-book
  labels:
    app.kubernetes.io/name: ch15-collector
    app.kubernetes.io/part-of: aio11y-book
    book.aio11y/owned-by: book
    book.aio11y/chapter: "15"
data:
  # config.yaml本体はリポジトリの collector-config/ch15-add-langfuse/config.yaml を kubectl で投入する想定。
  # ここは配布用サンプル。make deploy が --from-file で上書きする。
  config.yaml: |
    receivers: {otlp: {protocols: {grpc: {endpoint: 0.0.0.0:4317}, http: {endpoint: 0.0.0.0:4318}}}}
    processors: {memory_limiter: {check_interval: 1s, limit_mib: 256, spike_limit_mib: 64}, batch: {send_batch_size: 512, timeout: 5s}}
    exporters: {otlp/gateway: {endpoint: otel-gateway-opentelemetry-collector.observability:4317, tls: {insecure: true}}}
    service:
      pipelines:
        traces: {receivers: [otlp], processors: [memory_limiter, batch], exporters: [otlp/gateway]}
        metrics: {receivers: [otlp], processors: [memory_limiter, batch], exporters: [otlp/gateway]}
        logs: {receivers: [otlp], processors: [memory_limiter, batch], exporters: [otlp/gateway]}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ch15-collector
  namespace: aio11y-book
  labels:
    app.kubernetes.io/name: ch15-collector
    app.kubernetes.io/part-of: aio11y-book
    book.aio11y/owned-by: book
    book.aio11y/chapter: "15"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ch15-collector
      book.aio11y/chapter: "15"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ch15-collector
        app.kubernetes.io/part-of: aio11y-book
        book.aio11y/owned-by: book
        book.aio11y/chapter: "15"
    spec:
      containers:
        - name: collector
          image: docker.io/otel/opentelemetry-collector-contrib:0.147.0
          args:
            - "--config=/etc/otel/config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          envFrom:
            - secretRef:
                name: ch15-collector-secret
                optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: ch15-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: ch15-collector
  namespace: aio11y-book
  labels:
    app.kubernetes.io/name: ch15-collector
    app.kubernetes.io/part-of: aio11y-book
    book.aio11y/owned-by: book
    book.aio11y/chapter: "15"
spec:
  selector:
    app.kubernetes.io/name: ch15-collector
    book.aio11y/chapter: "15"
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
