apiVersion: v1
kind: ConfigMap
metadata:
  name: travel-helper-ch05-code
  namespace: aio11y-book
  labels:
    app.kubernetes.io/name: travel-helper
    app.kubernetes.io/part-of: aio11y-book
    book.aio11y/owned-by: book
    book.aio11y/chapter: "05"
data:
  agent.py: |
    from __future__ import annotations
    import logging, os, random, time
    from typing import List
    from fastapi import FastAPI
    from pydantic import BaseModel, Field
    from otel_setup import init_otel

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "INFO")
    logging.basicConfig(level=LOG_LEVEL, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("travel-helper-ch05")

    tracer, meter = init_otel(service_name=os.environ.get("OTEL_SERVICE_NAME", "travel-helper-ch05"))
    requests_counter = meter.create_counter("travel_helper.requests", description="Total number of /plan requests")
    duration_hist = meter.create_histogram("travel_helper.request.duration", unit="ms", description="End-to-end /plan request duration")

    app = FastAPI()

    class PlanRequest(BaseModel):
        city: str = Field(..., min_length=1)
        days: int = Field(..., ge=1, le=14)
        keywords: List[str] = Field(default_factory=list)

    class PlanResponse(BaseModel):
        itinerary: str
        trace_id: str

    def weather_tool(city: str, days: int) -> str:
        with tracer.start_as_current_span("tool.weather") as span:
            span.set_attribute("tool.city", city)
            span.set_attribute("tool.days", days)
            time.sleep(random.uniform(0.1, 0.2))
            return f"{city}は晴れ予報"

    @app.get("/healthz")
    def healthz():
        return {"status": "ok"}

    @app.post("/plan", response_model=PlanResponse)
    def plan(req: PlanRequest) -> PlanResponse:
        start = time.perf_counter()
        with tracer.start_as_current_span("handle_plan") as root:
            root.set_attribute("user.city", req.city)
            root.set_attribute("user.days", req.days)
            root.set_attribute("user.keywords_count", len(req.keywords))
            ctx = root.get_span_context()
            trace_id_hex = format(ctx.trace_id, "032x")
            with tracer.start_as_current_span("stage.plan") as span:
                items = [f"{kw}関連スポット" for kw in req.keywords] or ["市内中心部"]
                span.set_attribute("travel_helper.investigation_items_count", len(items))
                log.info("plan_stage decided items=%d", len(items))
            with tracer.start_as_current_span("stage.gather") as span:
                forecast = weather_tool(req.city, req.days)
                span.set_attribute("travel_helper.forecast_chars", len(forecast))
                log.info("gather_stage done forecast=%s", forecast)
            itinerary = f"{req.city} {req.days}日間: {forecast} / " + " / ".join(items)
        elapsed_ms = (time.perf_counter() - start) * 1000
        requests_counter.add(1, {"endpoint": "/plan"})
        duration_hist.record(elapsed_ms, {"endpoint": "/plan"})
        log.info("request done trace_id=%s elapsed_ms=%.1f", trace_id_hex, elapsed_ms)
        return PlanResponse(itinerary=itinerary, trace_id=trace_id_hex)
  otel_setup.py: |
    from __future__ import annotations
    import logging, os
    from typing import Tuple
    from opentelemetry import metrics, trace
    from opentelemetry._logs import set_logger_provider
    from opentelemetry.exporter.otlp.proto.grpc._log_exporter import OTLPLogExporter
    from opentelemetry.exporter.otlp.proto.grpc.metric_exporter import OTLPMetricExporter
    from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
    from opentelemetry.sdk._logs import LoggerProvider, LoggingHandler
    from opentelemetry.sdk._logs.export import BatchLogRecordProcessor
    from opentelemetry.sdk.metrics import MeterProvider
    from opentelemetry.sdk.metrics.export import PeriodicExportingMetricReader
    from opentelemetry.sdk.resources import Resource
    from opentelemetry.sdk.trace import TracerProvider
    from opentelemetry.sdk.trace.export import BatchSpanProcessor

    def _endpoint() -> str:
        return os.environ.get(
            "OTEL_EXPORTER_OTLP_ENDPOINT",
            "http://otel-gateway-opentelemetry-collector.observability:4317",
        )

    def init_otel(service_name: str) -> Tuple[trace.Tracer, metrics.Meter]:
        resource = Resource.create({"service.name": service_name})
        tp = TracerProvider(resource=resource)
        tp.add_span_processor(BatchSpanProcessor(OTLPSpanExporter(endpoint=_endpoint(), insecure=True)))
        trace.set_tracer_provider(tp)
        reader = PeriodicExportingMetricReader(OTLPMetricExporter(endpoint=_endpoint(), insecure=True), export_interval_millis=10_000)
        mp = MeterProvider(resource=resource, metric_readers=[reader])
        metrics.set_meter_provider(mp)
        lp = LoggerProvider(resource=resource)
        lp.add_log_record_processor(BatchLogRecordProcessor(OTLPLogExporter(endpoint=_endpoint(), insecure=True)))
        set_logger_provider(lp)
        handler = LoggingHandler(level=logging.NOTSET, logger_provider=lp)
        logging.getLogger().addHandler(handler)
        return trace.get_tracer(service_name), metrics.get_meter(service_name)
