kind: ConfigMap
metadata:
  name: travel-helper-ch11-code
  namespace: aio11y-book
  labels:
    app.kubernetes.io/name: travel-helper
    app.kubernetes.io/part-of: aio11y-book
    book.aio11y/owned-by: book
    book.aio11y/chapter: "11"
data:
  agent.py: |
    from __future__ import annotations
    import logging, os, random, time
    from typing import List
    from fastapi import FastAPI
    from pydantic import BaseModel, Field
    from langfuse_setup import init_langfuse
    from otel_setup import init_otel

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "INFO")
    logging.basicConfig(level=LOG_LEVEL, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("travel-helper-ch11")

    tracer, _meter = init_otel(os.environ.get("OTEL_SERVICE_NAME", "travel-helper-ch11"))
    langfuse = init_langfuse()

    app = FastAPI()

    class PlanRequest(BaseModel):
        city: str = Field(..., min_length=1)
        days: int = Field(..., ge=1, le=14)
        keywords: List[str] = Field(default_factory=list)

    class PlanResponse(BaseModel):
        itinerary: str
        trace_id: str

    def simple_llm_judge(itinerary, req):
        score = min(len(itinerary) / 80.0, 1.0) * 0.5
        if req.keywords:
            hit = sum(1 for kw in req.keywords if kw in itinerary) / len(req.keywords)
            score += hit * 0.5
        return round(score, 2)

    @app.get("/healthz")
    def healthz():
        return {"status": "ok"}

    @app.post("/plan", response_model=PlanResponse)
    def plan(req: PlanRequest) -> PlanResponse:
        start = time.perf_counter()
        with tracer.start_as_current_span("handle_plan") as root:
            root.set_attribute("user.city", req.city)
            root.set_attribute("user.days", req.days)
            trace_id_hex = format(root.get_span_context().trace_id, "032x")
            with tracer.start_as_current_span("stage.plan"):
                items = [f"{kw}関連スポット" for kw in req.keywords] or ["市内中心部"]
            with tracer.start_as_current_span("stage.gather"):
                time.sleep(random.uniform(0.05, 0.15))
                forecast = f"{req.city}は晴れ"
            itinerary = f"{req.city} {req.days}日間: {forecast} / " + " / ".join(items)
        elapsed_ms = (time.perf_counter() - start) * 1000
        score = simple_llm_judge(itinerary, req)
        if langfuse is not None:
            lf_trace = langfuse.trace(
                name="travel-helper.plan",
                user_id=req.city,
                metadata={"otel_trace_id": trace_id_hex, "keywords_count": len(req.keywords)},
                input={"city": req.city, "days": req.days, "keywords": req.keywords},
                output={"itinerary": itinerary},
            )
            lf_trace.span(name="stage.plan", input={"keywords": req.keywords}, output={"items_count": len(items)})
            lf_trace.span(name="stage.gather", input={"city": req.city, "days": req.days}, output={"forecast": forecast})
            lf_trace.score(name="judge.quality", value=score, comment="simple rule-based judge")
        log.info("plan done trace_id=%s score=%.2f elapsed_ms=%.1f", trace_id_hex, score, elapsed_ms)
        return PlanResponse(itinerary=itinerary, trace_id=trace_id_hex)
  otel_setup.py: |
    from __future__ import annotations
    import os
    from typing import Tuple
    from opentelemetry import metrics, trace
    from opentelemetry.exporter.otlp.proto.grpc.metric_exporter import OTLPMetricExporter
    from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
    from opentelemetry.sdk.metrics import MeterProvider
    from opentelemetry.sdk.metrics.export import PeriodicExportingMetricReader
    from opentelemetry.sdk.resources import Resource
    from opentelemetry.sdk.trace import TracerProvider
    from opentelemetry.sdk.trace.export import BatchSpanProcessor

    def _endpoint():
        return os.environ.get("OTEL_EXPORTER_OTLP_ENDPOINT", "http://otel-gateway-opentelemetry-collector.observability:4317")

    def init_otel(service_name):
        resource = Resource.create({"service.name": service_name})
        tp = TracerProvider(resource=resource)
        tp.add_span_processor(BatchSpanProcessor(OTLPSpanExporter(endpoint=_endpoint(), insecure=True)))
        trace.set_tracer_provider(tp)
        reader = PeriodicExportingMetricReader(OTLPMetricExporter(endpoint=_endpoint(), insecure=True), export_interval_millis=10_000)
        mp = MeterProvider(resource=resource, metric_readers=[reader])
        metrics.set_meter_provider(mp)
        return trace.get_tracer(service_name), metrics.get_meter(service_name)
  langfuse_setup.py: |
    from __future__ import annotations
    import logging, os
    log = logging.getLogger(__name__)

    def init_langfuse():
        host = os.environ.get("LANGFUSE_HOST")
        public_key = os.environ.get("LANGFUSE_PUBLIC_KEY")
        secret_key = os.environ.get("LANGFUSE_SECRET_KEY")
        if not (host and public_key and secret_key):
            log.warning("Langfuse credentials not set; skipping Langfuse recording")
            return None
        try:
            from langfuse import Langfuse
            return Langfuse(public_key=public_key, secret_key=secret_key, host=host)
        except ImportError as exc:
            log.error("langfuse package not installed: %s", exc)
            return None
        except Exception as exc:
            log.error("Failed to init Langfuse: %s", exc)
            return None
